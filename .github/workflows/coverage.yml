name: "coverage"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  coverage:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install JavaScript coverage tooling
        run: npm install --global c8@10

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate Rust coverage report
        run: cargo llvm-cov nextest --lcov --output-path rust-lcov.info
        shell: devenv shell -c -- bash -e {0}

      - name: generate JavaScript coverage report
        run: |
          rm -rf .node-coverage .node-lcov
          pnpm install --no-frozen-lockfile
          pnpm build
          NODE_V8_COVERAGE=.node-coverage \
            pnpm node --import tsx --test scripts/npm/tests/*.test.ts npm/tests/*.test.mjs
          c8 report \
            --all \
            --reporter=lcovonly \
            --report-dir .node-lcov \
            --temp-directory .node-coverage \
            --include "scripts/npm/*.ts" \
            --exclude "**/tests/**"
          cp .node-lcov/lcov.info js-lcov.info

      - name: combine lcov reports
        run: cat rust-lcov.info js-lcov.info > lcov.info

      - name: upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error

      - name: upload to codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
