name: "ci"

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  security:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: ".github/workflows/ .github/actions/"
          advanced-security: true

  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint clippy
        run: lint:clippy
        shell: devenv shell -c -- bash -e {0}

      - name: lint formatting
        run: lint:format
        shell: devenv shell -c -- bash -e {0}

      - name: check mdt blocks
        run: cargo run --bin mdt -- check
        shell: devenv shell -c -- bash -e {0}

  typecheck:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: build npm tooling
        run: pnpm build

      - name: typecheck
        run: pnpm check

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run rust tests
        run: test:all
        shell: devenv shell -c -- bash -e {0}

      - name: setup node for npm tests
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install pnpm for npm tests
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: run npm integration tests
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm node --import tsx --test scripts/npm/tests/*.test.ts

  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: cargo build --locked
        shell: devenv shell -c -- bash -e {0}

      - name: build all features
        run: cargo build --all-features --locked
        shell: devenv shell -c -- bash -e {0}

  cargo-deny:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  release-pr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'ifiokjr'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}

      - name: configure git
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          if user_info="$(gh api user --jq '{id: .id, login: .login, name: .name}')"; then
            user_id="$(echo "$user_info" | jq -r '.id')"
            user_login="$(echo "$user_info" | jq -r '.login')"
            user_name="$(echo "$user_info" | jq -r '.name // .login')"
          else
            user_id="41898282"
            user_login="github-actions[bot]"
            user_name="github-actions[bot]"
          fi

          git config user.name "$user_name"
          git config user.email "${user_id}+${user_login}@users.noreply.github.com"
        shell: devenv shell -c -- bash -e {0}

      - name: refresh tags from origin
        run: git fetch --force --tags origin
        shell: devenv shell -c -- bash -e {0}

      - name: detect current release commit
        id: release_record
        run: |
          set -euo pipefail

          release_record_error="$(mktemp)"
          if is_release_commit="$(mc step:release-record --from HEAD --format json --jq '.resolvedCommit == .recordCommit' 2>"$release_record_error")"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          subject="$(git log -1 --pretty=%s)"
          body="$(git log -1 --pretty=%B)"
          if [[ "$subject" == chore\(release\):* ]] || grep -q '<!-- monochange:release-record:start -->' <<<"$body"; then
            echo "::error::Release-looking commit could not be read as a release record; failing instead of silently skipping release automation."
            cat "$release_record_error" >&2
            exit 1
          fi

          echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
        shell: devenv shell -c -- bash -e {0}

      - name: refresh release pull request
        if: steps.release_record.outputs.is_release_commit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMIT_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: mc --log-level=debug release --commit --create-pr
        shell: devenv shell -c -- bash -e {0}

      - name: skip refresh on merged release commit
        if: steps.release_record.outputs.is_release_commit == 'true'
        run: echo "HEAD is already a merged release commit; skipping release PR refresh."

  release-post-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'ifiokjr'
    needs: release-pr
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: detect release commit and create tags
        id: tag_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: devenv shell -c -- bash -e {0}
        run: |
          set -euo pipefail

          if is_release_commit="$(mc step:release-record --from HEAD --format json --jq '.resolvedCommit == .recordCommit')"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
            if [ "${is_release_commit}" = "true" ]; then
              mc step:tag-release --from HEAD --push=true --format json | tee /tmp/tag-report.json
            fi
          else
            subject="$(git log -1 --pretty=%s)"
            body="$(git log -1 --pretty=%B)"
            if [[ "$subject" == chore\(release\):* ]] || grep -q '<!-- monochange:release-record:start -->' <<<"$body"; then
              echo "::error::Release-looking commit could not be read as a release record; failing instead of silently skipping release automation."
              mc step:release-record --from HEAD --format json
              exit 1
            fi
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: create draft releases
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mc step:publish-release --from-ref="HEAD" --draft --format json | tee /tmp/publish-release.json
        shell: devenv shell -c -- bash -e {0}

      - name: comment on released issues
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: mc step:comment-released-issues --from-ref="HEAD" --auto-close-issues
        shell: devenv shell -c -- bash -e {0}

      - name: trigger release workflow
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$(jq -r '.tags.mdt // empty' /tmp/tag-report.json)"
          if [ -z "$tag" ]; then
            echo "No mdt group tag found in tag-report.json, skipping release trigger"
            exit 0
          fi
          echo "Triggering release workflow for tag $tag"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            -f "tag=$tag"

  release-test:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'monochange/release')
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: create release commit
        id: release_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          before="$(git rev-parse HEAD)"
          mc release --commit
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi
        shell: devenv shell -- bash -e {0}

      - name: run tests against generated release commit
        if: steps.release_commit.outputs.created == 'true'
        run: test:all
        shell: devenv shell -- bash -e {0}

      - name: skip release tests when no release commit is created
        if: steps.release_commit.outputs.created == 'false'
        run: echo "No pull-request release commit was created; skipping release test preflight."

  release-lint:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'monochange/release')
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: create release commit
        id: release_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          before="$(git rev-parse HEAD)"
          mc release --commit
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi
        shell: devenv shell -- bash -e {0}

      - name: run lint against generated release commit
        if: steps.release_commit.outputs.created == 'true'
        run: lint:all
        shell: devenv shell -- bash -e {0}

      - name: skip release lint when no release commit is created
        if: steps.release_commit.outputs.created == 'false'
        run: echo "No pull-request release commit was created; skipping release lint preflight."
