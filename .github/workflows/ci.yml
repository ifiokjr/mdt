name: "ci"

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  security:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: ".github/workflows/ .github/actions/"
          advanced-security: true

  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: lint clippy
        run: lint:clippy
        shell: devenv shell -- bash -e {0}

      - name: lint formatting
        run: lint:format
        shell: devenv shell -- bash -e {0}

      - name: check mdt blocks
        run: cargo run --bin mdt -- check
        shell: devenv shell -- bash -e {0}

  typecheck:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: build npm tooling
        run: pnpm build

      - name: typecheck
        run: pnpm check

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run rust tests
        run: test:all
        shell: devenv shell -- bash -e {0}

      - name: setup node for npm tests
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install pnpm for npm tests
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: run npm integration tests
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm node --import tsx --test scripts/npm/tests/*.test.ts

  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: cargo build --locked
        shell: devenv shell -- bash -e {0}

      - name: build all features
        run: cargo build --all-features --locked
        shell: devenv shell -- bash -e {0}

  cargo-deny:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  release-test:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'monochange/release')
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: create release commit
        id: release_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          before="$(git rev-parse HEAD)"
          mc run release --commit
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi
        shell: devenv shell -- bash -e {0}

      - name: run tests against generated release commit
        if: steps.release_commit.outputs.created == 'true'
        run: test:all
        shell: devenv shell -- bash -e {0}

      - name: skip release tests when no release commit is created
        if: steps.release_commit.outputs.created == 'false'
        run: echo "No pull-request release commit was created; skipping release test preflight."

  release-lint:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'monochange/release')
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: create release commit
        id: release_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          before="$(git rev-parse HEAD)"
          mc run release --commit
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi
        shell: devenv shell -- bash -e {0}

      - name: run lint against generated release commit
        if: steps.release_commit.outputs.created == 'true'
        run: lint:all
        shell: devenv shell -- bash -e {0}

      - name: skip release lint when no release commit is created
        if: steps.release_commit.outputs.created == 'false'
        run: echo "No pull-request release commit was created; skipping release lint preflight."
