name: "publish"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example `v0.7.0`)."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.run_id }}
  cancel-in-progress: true

jobs:
  publish:
    environment: publisher
    permissions:
      actions: read
      contents: read
      id-token: write
    if: github.repository_owner == 'ifiokjr'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG='${{ inputs.tag }}'

          repo_url="https://github.com/${GITHUB_REPOSITORY}.git"

          if ! git ls-remote --exit-code --tags "$repo_url" "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist on the remote" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0

      - name: verify tag checkout
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="${{ steps.release_tag.outputs.tag }}"
          actual_commit=$(git rev-parse HEAD)
          tag_commit=$(git rev-list -n1 "$expected_tag")
          if [ "$actual_commit" != "$tag_commit" ]; then
            echo "::error::Checked-out commit $actual_commit does not match tag $expected_tag ($tag_commit)" >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$actual_commit" refs/remotes/origin/main 2>/dev/null; then
            echo "::error::Tag $expected_tag ($actual_commit) is not on the main branch" >&2
            exit 1
          fi

          echo "Verified: checked-out commit matches tag $expected_tag and is on main"

      - name: setup mc
        uses: ./.github/actions/setup-mc

      - name: setup devenv
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: get crates.io oidc auth token
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-oidc

      - name: check publish readiness
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
        run: mc step:publish-readiness --from HEAD --output "$RUNNER_TEMP/publish-readiness.json" --format json
        shell: devenv shell -- bash -e {0}

      - name: setup node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@m-d-t"

      - name: download release assets
        if: startsWith(steps.release_tag.outputs.tag, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "mdt-*-${RELEASE_TAG}.tar.gz" \
            --pattern "mdt-*-${RELEASE_TAG}.zip" \
            --dir "$RUNNER_TEMP/release-assets"
        shell: devenv shell -- bash -e {0}

      - name: build npm packages
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/npm/build-packages.mjs \
            --version "$VERSION" \
            --release-tag "$RELEASE_TAG" \
            --assets-dir "$RUNNER_TEMP/release-assets" \
            --out-dir "$RUNNER_TEMP/npm-packages"
        shell: devenv shell -- bash -e {0}

      - name: publish cargo packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
        run: mc step:publish-packages --log-level info --ecosystem cargo --output "$RUNNER_TEMP/publish-result.json" --format json
        shell: devenv shell -- bash -e {0}

      - name: publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          node scripts/npm/publish-packages.mjs \
            --packages-dir "$RUNNER_TEMP/npm-packages"
        shell: devenv shell -- bash -e {0}