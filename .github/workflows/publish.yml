name: publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.8.0)."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.run_id }}
  cancel-in-progress: true

jobs:
  publish:
    environment: publisher
    permissions:
      actions: read
      contents: read
      id-token: write
    if: github.repository_owner == 'ifiokjr'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG='${{ inputs.tag }}'
          if [[ "$TAG" != v* ]]; then
            echo "::error::Tag '$TAG' must be an mdt release tag like v0.8.0" >&2
            exit 1
          fi
          if ! git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist on the remote" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0

      - name: verify tag checkout
        shell: bash
        run: |
          set -euo pipefail
          expected_tag="${{ steps.release_tag.outputs.tag }}"
          actual_commit="$(git rev-parse HEAD)"
          tag_commit="$(git rev-list -n1 "$expected_tag")"
          if [ "$actual_commit" != "$tag_commit" ]; then
            echo "::error::Checked-out commit $actual_commit does not match tag $expected_tag ($tag_commit)" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$actual_commit" refs/remotes/origin/main 2>/dev/null; then
            echo "::error::Tag $expected_tag ($actual_commit) is not on main" >&2
            exit 1
          fi

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup node for publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@m-d-t"

      - name: install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: 10

      - name: build npm tooling
        run: pnpm install --no-frozen-lockfile && pnpm build

      - name: get crates oidc auth token
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: crates-oidc

      - name: download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "mdt-*-${RELEASE_TAG}.tar.gz" \
            --pattern "mdt-*-${RELEASE_TAG}.zip" \
            --dir "$RUNNER_TEMP/release-assets"
          find "$RUNNER_TEMP/release-assets" -maxdepth 1 -type f -print

      - name: populate platform packages with release binaries
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail
          pnpm node --import tsx scripts/npm/build-packages.ts \
            --release-tag "$RELEASE_TAG" \
            --assets-dir "$RUNNER_TEMP/release-assets"

      - name: populate cli npm package with launcher
        run: |
          set -euo pipefail
          chmod +x packages/m-d-t__cli/bin/mdt.js || true

      - name: check publish readiness
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
          NPM_CONFIG_PROVENANCE: "true"
        run: mc step publish-readiness --from HEAD --output "$RUNNER_TEMP/publish-readiness.json" --format json
        shell: devenv shell -- bash -e {0}

      - name: publish packages with monochange
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-oidc.outputs.token }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          mc --log-level=info step publish-packages \
            --all \
            --output "$RUNNER_TEMP/publish-result.json" \
            --format json
        shell: devenv shell -- bash -e {0}
