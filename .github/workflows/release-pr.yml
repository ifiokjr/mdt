name: release-pr

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create:
    if: github.repository_owner == 'ifiokjr'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: configure release git identity
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          if user_info="$(gh api user --jq '{id: .id, login: .login, name: .name}')"; then
            user_id="$(echo "$user_info" | jq -r '.id')"
            user_login="$(echo "$user_info" | jq -r '.login')"
            user_name="$(echo "$user_info" | jq -r '.name // .login')"
          else
            user_id="41898282"
            user_login="github-actions[bot]"
            user_name="github-actions[bot]"
          fi

          git config user.name "$user_name"
          git config user.email "${user_id}+${user_login}@users.noreply.github.com"
        shell: devenv shell -- bash -e {0}

      - name: configure release git credentials
        env:
          RELEASE_PR_MERGE_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_PR_MERGE_TOKEN" ]; then
            echo "::error::RELEASE_PR_MERGE_TOKEN is required for release pull request automation." >&2
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${RELEASE_PR_MERGE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: refresh tags from origin
        run: git fetch --force --tags origin
        shell: devenv shell -- bash -e {0}

      - name: detect current release commit
        id: release_record
        run: |
          set -euo pipefail

          release_record_error="$(mktemp)"
          if is_release_commit="$(mc step release-record --from HEAD --format json --jq '.resolved_commit == .record_commit' 2>"$release_record_error")"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          subject="$(git log -1 --pretty=%s)"
          body="$(git log -1 --pretty=%B)"
          if [[ "$subject" == chore\(release\):\ prepare\ release* ]] || grep -q '<!-- monochange:release-record:start -->' <<<"$body"; then
            echo "::error::Release-looking commit could not be read as a release record; failing instead of silently skipping release automation."
            cat "$release_record_error" >&2
            exit 1
          fi

          echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
        shell: devenv shell -- bash -e {0}

      - name: detect pending changesets
        id: pending_changesets
        if: steps.release_record.outputs.is_release_commit != 'true'
        run: |
          set -euo pipefail
          has_changesets=false
          if [ -d .changeset ] && find .changeset -type f -name '*.md' -print -quit | grep -q .; then
            has_changesets=true
          fi
          echo "has_changesets=${has_changesets}" >> "$GITHUB_OUTPUT"

      - name: refresh release pull request
        if: steps.release_record.outputs.is_release_commit != 'true' && steps.pending_changesets.outputs.has_changesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
          GITHUB_COMMIT_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          export GITHUB_TOKEN="$GH_TOKEN"

          mc --log-level=debug run release --commit --create-pr --no-verify=true
        shell: devenv shell -- bash -e {0}

      - name: skip refresh without changesets
        if: steps.release_record.outputs.is_release_commit != 'true' && steps.pending_changesets.outputs.has_changesets != 'true'
        run: echo "No pending changesets found; skipping release PR refresh."

      - name: skip refresh on merged release commit
        if: steps.release_record.outputs.is_release_commit == 'true'
        run: echo "HEAD is already a merged release commit; skipping release PR refresh."

  tag:
    if: github.repository_owner == 'ifiokjr'
    needs: create
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: configure release git credentials
        env:
          RELEASE_PR_MERGE_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_PR_MERGE_TOKEN" ]; then
            echo "::error::RELEASE_PR_MERGE_TOKEN is required for release tagging." >&2
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${RELEASE_PR_MERGE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: detect release commit and create tags
        id: tag_release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          export GITHUB_TOKEN="$GH_TOKEN"

          if is_release_commit="$(mc --log-level=debug step release-record --from HEAD --format json --jq '.resolved_commit == .record_commit')"; then
            echo "is_release_commit=${is_release_commit}" >> "$GITHUB_OUTPUT"
            if [ "${is_release_commit}" = "true" ]; then
              mc --log-level=debug step tag-release --from HEAD --push=true --format json | tee /tmp/tag-report.json
            fi
          else
            subject="$(git log -1 --pretty=%s)"
            body="$(git log -1 --pretty=%B)"
            if [[ "$subject" == chore\(release\):\ prepare\ release* ]] || grep -q '<!-- monochange:release-record:start -->' <<<"$body"; then
              echo "::error::Release-looking commit could not be read as a release record; failing instead of silently skipping release automation."
              mc --log-level=debug step release-record --from HEAD --format json
              exit 1
            fi
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi
        shell: devenv shell -- bash -e {0}

      - name: create draft releases
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          export GITHUB_TOKEN="$GH_TOKEN"
          mc --log-level=debug step publish-release --from-ref="HEAD" --draft --format json | tee /tmp/publish-release.json
        shell: devenv shell -- bash -e {0}

      - name: comment on released issues
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          export GITHUB_TOKEN="$GH_TOKEN"
          mc --log-level=debug step comment-released-issues --from-ref="HEAD" --auto-close-issues
        shell: devenv shell -- bash -e {0}

      - name: trigger release workflow
        if: steps.tag_release.outputs.is_release_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_MERGE_TOKEN }}
        run: |
          set -euo pipefail
          export GITHUB_TOKEN="$GH_TOKEN"
          tag="$(jq -r '.tags.mdt // empty' /tmp/tag-report.json)"
          if [ -z "$tag" ]; then
            echo "No mdt group tag found in tag-report.json, skipping release trigger"
            exit 0
          fi
          echo "Triggering release workflow for tag $tag"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            -f "tag=$tag"
        shell: devenv shell -- bash -e {0}
